<!DOCTYPE html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta charset="utf-8"/>
<title>EisdieleKasse</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
:root {
  --bg: #fff5ec; --surface: #ffffff; --border: #f1e0d0; --soft: #fff0e0;
  --text: #3d2c4e; --muted: #8c7a8e;
  --primary: #ff6b8b; --primary-soft: #ffeaf1;
  --accent: #5ebfa8; --accent-bg: #e3f5ef;
  --category: #f4a442;
  --danger: #c44b66;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
button { font-family: inherit; cursor: pointer; }
.host, .kasse-root { width: 100%; height: 100%; }
.kasse-root { display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 8px; }
.topbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--surface); border-radius: 14px; border-left: 4px solid var(--primary); }
.shop { font-size: 17px; font-weight: 600; }
.active-table { font-size: 14px; color: var(--muted); flex: 1; }
.mode-btn { border: 1px solid var(--border); background: var(--surface); padding: 9px 14px; font-size: 14px; border-radius: 8px; color: var(--muted); }
.mode-btn.on { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; }
.tables { display: flex; gap: 6px; overflow-x: auto; padding: 6px 2px; }
.tbtn { min-width: 86px; padding: 8px 10px; border: 1px solid var(--border); background: var(--surface); border-radius: 10px; font-size: 12px; white-space: pre-line; text-align: center; }
.tbtn.busy { background: var(--accent-bg) !important; border-color: var(--accent) !important; color: var(--accent) !important; font-weight: 500 !important; }
.tbtn.on { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; }
.main { display: grid; grid-template-columns: 1fr 320px; gap: 10px; flex: 1; overflow: hidden; }
.left { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.cats { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-btn { border: 1px solid var(--border); background: var(--surface); padding: 9px 16px; font-size: 14px; border-radius: 10px; color: var(--muted); }
.cat-btn.on { background: var(--category) !important; color: white !important; border-color: var(--category) !important; }
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; overflow-y: auto; align-content: start; flex: 1; }
.tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px; min-height: 92px; font-size: 14px; white-space: pre-line; text-align: center; transition: background 0.15s; }
.tile:active, .tile:hover { background: var(--primary-soft) !important; border-color: var(--primary) !important; }
.cart { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; }
.cart-header { font-weight: 600; font-size: 15px; margin-bottom: 8px; }
.lines { flex: 1; overflow-y: auto; }
.empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
.line { display: grid; grid-template-columns: 36px 1fr auto 28px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.qty { background: var(--soft); border-radius: 4px; padding: 1px 6px; text-align: center; font-size: 12px; }
.nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pr { font-variant-numeric: tabular-nums; }
.rm { color: var(--muted); font-size: 18px; padding: 4px; }
.totals { padding: 10px 0 6px; border-top: 1px solid var(--border); font-size: 13px; }
.totals .row { display: flex; justify-content: space-between; padding: 3px 0; color: var(--muted); }
.totals .row.sum { font-size: 20px; color: var(--text); font-weight: 600; }
.totals .val { font-variant-numeric: tabular-nums; }
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
.act { padding: 13px 8px; font-size: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
.act.pay { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; grid-column: span 2 !important; font-weight: 500 !important; }
.act.cancel { color: var(--danger) !important; border-color: var(--danger) !important; }

/* TMS Inline-Styles ueberschreiben (TWebPanel rendert als span mit width/height inline) */
.kasse-root, .topbar, .tables, .main, .left, .cats, .tiles, .cart,
.lines, .totals, .row, .actions {
  display: block !important; width: auto !important; height: auto !important;
}
.kasse-root { display: flex !important; flex-direction: column !important; height: 100vh !important; padding: 10px !important; gap: 8px !important; }
.topbar { display: flex !important; align-items: center !important; gap: 12px !important; padding: 12px 16px !important; background: var(--surface) !important; border-radius: 12px !important; }
.tables { display: flex !important; gap: 6px !important; overflow-x: auto !important; padding: 6px 2px !important; }
.main { display: grid !important; grid-template-columns: 1fr 320px !important; gap: 10px !important; flex: 1 !important; overflow: hidden !important; }
.left { display: flex !important; flex-direction: column !important; gap: 10px !important; min-width: 0 !important; }
.cats { display: flex !important; gap: 6px !important; flex-wrap: wrap !important; }
.tiles { display: grid !important; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) !important; gap: 8px !important; overflow-y: auto !important; align-content: start !important; flex: 1 !important; }
.cart { display: flex !important; flex-direction: column !important; background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 12px !important; padding: 14px !important; }
.lines { flex: 1 !important; overflow-y: auto !important; }
.totals { display: block !important; padding: 10px 0 6px !important; border-top: 1px solid var(--border) !important; font-size: 13px !important; flex-shrink: 0 !important; margin-top: 6px !important; width: auto !important; height: auto !important; }
.row { display: flex !important; justify-content: space-between !important; padding: 3px 0 !important; color: var(--muted) !important; width: auto !important; height: auto !important; }
.row.sum { font-size: 20px !important; color: var(--text) !important; font-weight: 600 !important; padding-top: 6px !important; }
.actions { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 6px !important; margin-top: 10px !important; }
.line { display: flex !important; align-items: center !important; gap: 8px !important; padding: 8px 0 !important; border-bottom: 1px solid var(--border) !important; font-size: 13px !important; width: 100% !important; }
.line .qty { flex: 0 0 32px !important; }
.line .nm { flex: 1 1 auto !important; min-width: 0 !important; overflow: hidden !important; text-overflow: ellipsis !important; white-space: nowrap !important; }
.line .pr { flex: 0 0 auto !important; white-space: nowrap !important; font-weight: 500 !important; }
.line .rm { flex: 0 0 24px !important; }
/* Buttons und Tiles auch */
.tbtn, .cat-btn, .mode-btn, .tile, .act, .rm { width: auto !important; height: auto !important; display: inline-block !important; }
.tile { display: inline-block !important; min-height: 92px !important; padding: 12px 6px !important; }
.act.pay { grid-column: span 2 !important; }
.shop, .active-table, .cart-header, .empty, .qty, .nm, .pr, .val { width: auto !important; height: auto !important; }

/* TMS injiziert anonyme <div>-Wrapper zwischen Panel-spans und ihren Kindern.
   display: contents macht diese divs fuer das Layout unsichtbar,
   damit unsere Flex-/Grid-Container ihre echten Kinder erreichen. */
.kasse-root > div, .topbar > div, .tables > div, .main > div, .left > div,
.cats > div, .tiles > div, .cart > div, .lines > div, .totals > div,
.row > div, .actions > div, .line > div, .host > div {
  display: contents !important;
}
/* Innerhalb der Kasse keine absoluten/fixed Positions */
.host, .host * {
  position: static !important;
}
/* Cart als Position-Anker, falls doch noch was schwebt */
.cart {
  position: relative !important;
}

/* Produktname in der Warenkorb-Zeile sichtbar machen
   (overflow:hidden kollidiert mit TMS Inline-Styles und versteckt den Text) */
.nm {
  display: block !important;
  overflow: visible !important;
  width: auto !important;
  height: auto !important;
  min-width: 0 !important;
  white-space: nowrap !important;
  text-overflow: clip !important;
  color: var(--text) !important;
  font-size: 13px !important;
}
</style>
</head>
<body>
<script src="EisdieleKasse.js"></script>
<script>
  // Boot-Workaround: pas2js Trial vergisst manchmal den rtl.run-Aufruf am Ende
  if (typeof rtl !== 'undefined' && typeof rtl.run === 'function') {
    rtl.run('program');
  } else {
    alert('FEHLER: rtl ist nicht definiert. EisdieleKasse.js wurde nicht geladen oder ausgefuehrt.');
  }
</script>
</body>
</html>
